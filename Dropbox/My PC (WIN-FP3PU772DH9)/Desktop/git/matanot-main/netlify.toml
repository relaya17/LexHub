[build]
  # Build command for the client
  command = "cd apps/client && pnpm install && pnpm build"
  # Directory where the built files will be located
  publish = "apps/client/dist"
  
  # Environment variables for build
  [build.environment]
    NODE_VERSION = "18"
    PNPM_VERSION = "8"

# Redirects for SPA routing (React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Proxy API requests to the backend server (if deployed separately)
# Uncomment and update the URL if your server is deployed on Render or another service
# [[redirects]]
#   from = "/api/*"
#   to = "https://your-server.onrender.com/api/:splat"
#   status = 200
#   force = true

